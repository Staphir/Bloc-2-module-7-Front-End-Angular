<h3>Top Pokémons</h3>

@for (pokemon of pokemonList | slice:0:3; track pokemon.id) {
  <app-pokemon-item
    [pokemon]="pokemon"
    [settable]="true"
    (selectPokemon)="onSelectPokemon($event)"
  ></app-pokemon-item>
} @empty {
  <div class="my-2">No pokemon added</div>
}

@if (setPokemon) {
  <app-pokemon-update
    [selectedPokemon]="selectedPokemon"
    (updatePokemon)="onUpdatePokemon($event)"
  ></app-pokemon-update>
}
